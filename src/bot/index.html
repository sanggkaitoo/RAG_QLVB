<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tham Mưu QLVB - Qwen 2.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #212121; --chat-bg: #2f2f2f; --text: #ececf1; --accent: #10a37f; --badge: #ca8a04; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #171717; padding: 15px 20px; text-align: center; border-bottom: 1px solid #4d4d4f; }
        header h1 { margin: 0; font-size: 18px; color: #fff; font-weight: 600; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; max-width: 900px; margin: 0 auto; width: 100%; }
        .message { padding: 20px; border-radius: 8px; line-height: 1.6; font-size: 15px; }
        .user-msg { background: var(--bg); }
        .ai-msg { background: var(--chat-bg); box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .input-area { background: #212121; padding: 20px; border-top: 1px solid #4d4d4f; }
        .input-box { max-width: 900px; margin: 0 auto; display: flex; gap: 10px; background: #2f2f2f; padding: 10px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; padding: 5px 10px; }
        button { background: var(--accent); border: none; padding: 10px 20px; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed;}
        .loading { font-style: italic; color: #8e8ea0; font-size: 14px; }
        
        .cite-tag { display: inline-block; background: rgba(16, 163, 127, 0.15); color: #2dd4bf; padding: 2px 8px; border-radius: 4px; font-size: 13px; cursor: pointer; position: relative; border: 1px solid #14b8a6; margin: 0 2px;}
        .cite-tag:hover .tooltip { display: block; }
        .tooltip { display: none; position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background: #1e293b; color: #f8fafc; padding: 12px; border-radius: 8px; width: 300px; font-size: 13px; z-index: 10; border: 1px solid #475569; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); line-height: 1.5;}
        .tooltip::after { content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px; border-width: 5px; border-style: solid; border-color: #1e293b transparent transparent transparent; }
        .meta-badge { display: inline-block; background: var(--badge); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-bottom: 6px; font-weight: 600;}
        .meta-badge.bao_cao { background: #0284c7; }
        .meta-badge.van_ban_trien_khai { background: #16a34a; }
        .topic-tag { display: inline-block; background: #475569; color: #e2e8f0; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin: 2px 2px 0 0;}
    </style>
</head>
<body>
    <header>
        <h1>🏛️ Trợ lý Tham mưu AI (Powered by Qwen 2.5 72B)</h1>
    </header>

    <div class="chat-container" id="chat">
        <div class="message ai-msg">
            Xin chào! Tôi là Trợ lý AI chuyên phân tích và đối chiếu văn bản. Các văn bản đã được phân loại chuẩn chỉ theo từng Nghị quyết và Lĩnh vực (Ví dụ: Hạ tầng số, Khoa học công nghệ). Bạn cần tra cứu tiến độ hay báo cáo nào?
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="queryInput" placeholder="Ví dụ: Có bao nhiêu xã đã báo cáo hoàn thành hạ tầng số theo Nghị quyết 57?" onkeypress="if(event.key === 'Enter') askAI()">
            <button id="sendBtn" onclick="askAI()">Gửi</button>
        </div>
    </div>

<script>
    async function askAI() {
        const input = document.getElementById('queryInput');
        const query = input.value.trim();
        if (!query) return;

        const chat = document.getElementById('chat');
        const btn = document.getElementById('sendBtn');
        
        chat.innerHTML += `<div class="message user-msg"><strong>Bạn:</strong><br>${query}</div>`;
        input.value = '';
        input.disabled = true; btn.disabled = true;

        const aiId = 'msg-' + Date.now();
        chat.innerHTML += `<div class="message ai-msg" id="${aiId}"><div class="loading">🔍 Qwen đang phân tích ý định và trích xuất dữ liệu từ CSDL Vector...</div></div>`;
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch(`/api/search_stream?q=${encodeURIComponent(query)}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            
            let rawBuffer = "";
            let contexts = [];
            let aiText = "";
            const msgDiv = document.getElementById(aiId);

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                rawBuffer += decoder.decode(value, { stream: true });
                
                if (rawBuffer.includes("[/SOURCES]")) {
                    const parts = rawBuffer.split("[/SOURCES]");
                    if (contexts.length === 0) {
                        contexts = JSON.parse(parts[0].replace("[SOURCES]", ""));
                    }
                    aiText = parts[1] || "";
                    
                    let formattedText = marked.parse(aiText);
                    
                    // NÂNG CẤP: Tìm toàn bộ cụm chứa nhiều số như [Nguồn 1, 9, 14, 21]
                    formattedText = formattedText.replace(/\[(?:Nguồn|Tài liệu|Đoạn)\s*([\d\s,]+)\]/gi, (match, groupNumbers) => {
                        
                        // Tách các số ra khỏi dấu phẩy (VD: "1, 9, 14" -> mảng [1, 9, 14])
                        const numbers = groupNumbers.split(',').map(n => n.trim());
                        
                        // Tạo ra một mảng các nút bấm (Mỗi số 1 nút)
                        const citationButtons = numbers.map(num => {
                            const doc = contexts[parseInt(num) - 1];
                            if (!doc) return `[Nguồn ${num}]`; // Bỏ qua nếu lỗi không tìm thấy tài liệu
                            
                            const loaiVb = doc.metadata.loai_van_ban || 'Công văn';
                            const loaiLower = loaiVb.toLowerCase();
                            
                            // Phân màu tự động theo cụm Nghiệp vụ văn thư
                            let badgeClass = '';
                            if (loaiLower.includes('báo cáo') || loaiLower.includes('tờ trình') || loaiLower.includes('thông báo')) badgeClass = 'bc_nhom';
                            else if (loaiLower.includes('kế hoạch') || loaiLower.includes('đề án') || loaiLower.includes('chương trình') || loaiLower.includes('phương án')) badgeClass = 'kh_nhom';
                            else if (loaiLower.includes('nghị quyết') || loaiLower.includes('quyết định') || loaiLower.includes('chỉ thị') || loaiLower.includes('quy định') || loaiLower.includes('quy chế')) badgeClass = 'qd_nhom';
                            
                            let tagsHtml = '';
                            if (doc.metadata.tags && doc.metadata.tags.length > 0) {
                                tagsHtml = '<div style="margin-top: 6px;">' + doc.metadata.tags.map(tag => `<span class="topic-tag">#${tag}</span>`).join('') + '</div>';
                            }

                            // --- CẬP NHẬT MỚI: Lấy thêm Ngày Ban Hành ---
                            const ngayBanHanh = doc.metadata.ngay_ban_hanh || 'Chưa rõ';

                            return `<span class="cite-tag">📄 Nguồn ${num}
                                <div class="tooltip">
                                    <span class="meta-badge ${badgeClass}">${loaiVb}</span><br>
                                    <strong>Số ký hiệu:</strong> <span style="color:#38bdf8;">${doc.metadata.so_ky_hieu || 'N/A'}</span><br>
                                    <strong>Ngày BH:</strong> <span style="color:#cbd5e1;">${ngayBanHanh}</span><br>
                                    <hr style="border:0; border-top:1px solid #475569; margin:6px 0;">
                                    <em>${doc.metadata.trich_yeu || doc.metadata.file_name || ''}</em>
                                    ${tagsHtml}
                                </div>
                            </span>`;
                        });

                        // Nối tất cả các nút lại với nhau và bọc cách nhau 1 khoảng trắng
                        return citationButtons.join(' ');
                    });

                    msgDiv.innerHTML = formattedText;
                    chat.scrollTop = chat.scrollHeight;
                }
            }
        } catch (e) {
            document.getElementById(aiId).innerHTML = "❌ Lỗi kết nối đến máy chủ AI (OpenRouter/Qwen).";
        } finally {
            input.disabled = false; btn.disabled = false; input.focus();
        }
    }
</script>
</body>
</html>
